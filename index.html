<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="婺城兽医路线" />
  <meta name="theme-color" content="#0f3d5e" />
  <title>金华市婺城区宠物医疗店面路线</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #102033;
      --muted: #5e6c80;
      --line: #dce3ee;
      --blue: #1f63e9;
      --green: #047857;
      --red: #be123c;
      --orange: #db4c15;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); }
    body { overflow: hidden; }
    a { color: var(--blue); text-decoration: none; }
    button, input { font: inherit; }
    .app {
      display: grid;
      grid-template-rows: minmax(310px, 43vh) minmax(0, 57vh);
      height: 100vh;
      height: 100dvh;
      background: var(--bg);
    }
    #map { width: 100%; height: 100%; min-height: 310px; background: #d9dde5; }
    .sheet {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-radius: 16px 16px 0 0;
      margin-top: -14px;
      z-index: 400;
      box-shadow: 0 -4px 24px rgba(16, 32, 51, .12);
    }
    header {
      padding: 13px 14px 10px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .summary div {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 9px;
      background: #f8fafc;
    }
    .summary b { display: block; font-size: 18px; line-height: 1.1; }
    .summary span { display: block; color: var(--muted); font-size: 11px; margin-top: 3px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 9px;
    }
    .toolbar input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      outline: none;
      background: #fff;
      font-size: 15px;
    }
    .toolbar button {
      border: 0;
      border-radius: 8px;
      padding: 0 12px;
      background: #0f3d5e;
      color: #fff;
      font-weight: 700;
    }
    .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .list {
      min-height: 0;
      overflow: auto;
      padding: 6px 10px calc(22px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }
    .stop {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      padding: 12px 4px;
      border-bottom: 1px solid #edf1f6;
    }
    .stop.is-hidden { display: none; }
    .badge {
      display: inline-flex;
      width: 30px;
      height: 30px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
    }
    .stop:first-child .badge { background: var(--green); }
    .stop:last-child .badge { background: var(--red); }
    .name {
      margin-top: 1px;
      font-weight: 800;
      font-size: 15px;
      line-height: 1.35;
    }
    .addr, .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 9px;
    }
    .actions a, .actions button {
      display: flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--blue);
      font-weight: 700;
      font-size: 13px;
    }
    .actions a.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .number-marker {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      background: var(--blue);
      border: 2px solid #fff;
      box-shadow: 0 3px 9px rgba(16, 32, 51, .30);
    }
    .number-marker.start { background: var(--green); }
    .number-marker.end { background: var(--red); }
    .leaflet-popup-content-wrapper { border-radius: 8px; }
    .popup-title { font-weight: 800; margin-bottom: 4px; }
    .popup-text { color: #344054; line-height: 1.45; }
    .gate {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: linear-gradient(160deg, #0f3d5e 0%, #1b6f6a 100%);
    }
    .gate-card {
      width: min(430px, 100%);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(0,0,0,.28);
      padding: 22px;
    }
    .gate-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: 0;
    }
    .gate-card p {
      margin: 0 0 15px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }
    .gate-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-size: 18px;
      outline: none;
    }
    .gate-card button {
      width: 100%;
      margin-top: 10px;
      border: 0;
      border-radius: 8px;
      padding: 12px;
      background: #0f3d5e;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
    }
    .error { min-height: 20px; margin-top: 8px; color: #be123c; font-size: 13px; }
    .hidden { display: none; }
    @media (min-width: 860px) {
      body { overflow: hidden; }
      .app { grid-template-columns: 430px minmax(0, 1fr); grid-template-rows: 100vh; }
      #map { grid-column: 2; grid-row: 1; height: 100vh; min-height: 100vh; }
      .sheet {
        grid-column: 1;
        grid-row: 1;
        border-top: 0;
        border-right: 1px solid var(--line);
        border-radius: 0;
        margin-top: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div id="gate" class="gate">
    <section class="gate-card" aria-label="访问口令">
      <h2>婺城兽医路线</h2>
      <p>请输入访问口令。这个口令只是避免链接被随手打开，不是强安全保护。</p>
      <input id="pass" type="password" autocomplete="current-password" inputmode="text" placeholder="访问口令" />
      <button id="unlock">打开路线</button>
      <div id="error" class="error" aria-live="polite"></div>
    </section>
  </div>

  <main id="app" class="app hidden">
    <div id="map"></div>
    <section class="sheet">
      <header>
        <h1>金华市婺城区宠物医疗店面路线</h1>
        <div class="summary">
          <div><b id="count">--</b><span>店面</span></div>
          <div><b id="distance">--</b><span>近似直线里程</span></div>
          <div><b>GCJ-02</b><span>高德坐标</span></div>
        </div>
        <div class="toolbar">
          <input id="search" type="search" placeholder="搜索店名、地址、电话" />
          <button id="fit">全图</button>
        </div>
        <div class="note">按编号逐站前往；点“高德定位”会打开高德地图。实际驾车/步行以高德实时导航为准。</div>
      </header>
      <div id="list" class="list"></div>
    </section>
  </main>

    const password = String.fromCharCode(118,101,116,50,48,50,54);
    const gate = document.getElementById("gate");
    const app = document.getElementById("app");
    const passInput = document.getElementById("pass");
    const unlock = document.getElementById("unlock");
    const error = document.getElementById("error");
    let map, bounds, markers = [], clinics = [];

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));

    function decodePayload() {
      const binary = atob(encodedPayload);
      const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
      return JSON.parse(new TextDecoder("utf-8").decode(bytes));
    }

    function unlockPage() {
      if (passInput.value !== password) {
        error.textContent = "口令不对";
        passInput.select();
        return;
      }
      localStorage.setItem("vetmap_access", "ok");
      gate.classList.add("hidden");
      app.classList.remove("hidden");
      initMap();
    }

    unlock.addEventListener("click", unlockPage);
    passInput.addEventListener("keydown", event => {
      if (event.key === "Enter") unlockPage();
    });

    function initMap() {
      if (map) return;
      const payload = decodePayload();
      clinics = payload.rows;
      const summary = payload.summary;
      document.getElementById("count").textContent = summary.count;
      document.getElementById("distance").textContent = Number(summary.total_distance_km).toFixed(1) + " km";

      map = L.map("map", { zoomControl: true, preferCanvas: true });
      L.tileLayer("https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}", {
        subdomains: ["1", "2", "3", "4"],
        maxZoom: 19,
        attribution: "高德地图"
      }).addTo(map);

      const latlngs = clinics.map(p => [p.lat, p.lng]);
      bounds = L.latLngBounds(latlngs);
      L.polyline(latlngs, { color: "#db4c15", weight: 4, opacity: 0.9 }).addTo(map);
      map.fitBounds(bounds, { padding: [26, 26] });

      const list = document.getElementById("list");
      list.innerHTML = "";
      clinics.forEach((p, index) => {
        const cls = index === 0 ? "number-marker start" : index === clinics.length - 1 ? "number-marker end" : "number-marker";
        const icon = L.divIcon({
          className: "",
          html: `<div class="${cls}">${p.order}</div>`,
          iconSize: [27, 27],
          iconAnchor: [13, 13],
          popupAnchor: [0, -14]
        });
        const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
        marker.bindPopup(`
          <div class="popup-title">${p.order}. ${escapeHtml(p.name)}</div>
          <div class="popup-text">${escapeHtml(p.address || "地址缺失")}</div>
          <div class="popup-text">电话：${escapeHtml(p.phone || "未提供")}</div>
          <div class="popup-text">累计：${Number(p.cumulative_distance_km).toFixed(2)} km</div>
          <div class="popup-text"><a href="${p.amap_marker_url}" target="_blank" rel="noreferrer">高德定位</a></div>
        `);
        marker.on("click", () => highlight(index));
        markers.push(marker);

        const item = document.createElement("article");
        item.className = "stop";
        item.dataset.index = String(index);
        item.dataset.search = `${p.order} ${p.name} ${p.address} ${p.phone} ${p.area}`.toLowerCase();
        item.innerHTML = `
          <div><span class="badge">${p.order}</span></div>
          <div>
            <div class="name">${escapeHtml(p.name)}</div>
            <div class="addr">${escapeHtml(p.address || "地址缺失")}</div>
            <div class="meta">上一站 ${Number(p.prev_distance_km).toFixed(2)} km · 累计 ${Number(p.cumulative_distance_km).toFixed(2)} km · 电话：${escapeHtml(p.phone || "未提供")}</div>
            <div class="actions">
              <a class="primary" href="${p.amap_marker_url}" target="_blank" rel="noreferrer">高德定位</a>
              <button type="button" data-focus="${index}">地图定位</button>
            </div>
          </div>
        `;
        list.appendChild(item);
      });
      list.addEventListener("click", event => {
        const button = event.target.closest("[data-focus]");
        if (button) highlight(Number(button.dataset.focus));
      });
      document.getElementById("fit").addEventListener("click", () => map.fitBounds(bounds, { padding: [26, 26] }));
      document.getElementById("search").addEventListener("input", event => {
        const term = event.target.value.trim().toLowerCase();
        document.querySelectorAll(".stop").forEach(el => {
          el.classList.toggle("is-hidden", term && !el.dataset.search.includes(term));
        });
      });
    }

    function highlight(index) {
      const p = clinics[index];
      map.setView([p.lat, p.lng], Math.max(map.getZoom(), 15), { animate: true });
      markers[index].openPopup();
      const row = document.querySelector(`[data-index="${index}"]`);
      row?.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    if (localStorage.getItem("vetmap_access") === "ok") {
      gate.classList.add("hidden");
      app.classList.remove("hidden");
      initMap();
    } else {
      passInput.focus();
    }
  </script>
