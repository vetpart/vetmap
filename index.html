<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="VETMAP" />
  <meta name="theme-color" content="#0f3d5e" />
  <title>VETMAP</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #102033;
      --muted: #5e6c80;
      --line: #dce3ee;
      --blue: #1f63e9;
      --green: #047857;
      --red: #be123c;
      --orange: #db4c15;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); }
    body { overflow: hidden; }
    a { color: var(--blue); text-decoration: none; }
    button, input, select { font: inherit; }
    .hidden { display: none !important; }
    .app {
      display: grid;
      grid-template-rows: minmax(300px, 42vh) minmax(0, 58vh);
      height: 100vh;
      height: 100dvh;
      background: var(--bg);
    }
    .map-wrap { position: relative; width: 100%; height: 100%; min-height: 300px; }
    #map { width: 100%; height: 100%; min-height: 300px; background: #d9dde5; }
    .map-fit {
      position: absolute;
      right: 12px;
      bottom: 22px;
      z-index: 700;
      border: 0;
      border-radius: 8px;
      width: 54px;
      height: 38px;
      background: #0f3d5e;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 4px 14px rgba(16, 32, 51, .22);
    }
    .sheet {
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-radius: 16px 16px 0 0;
      margin-top: -14px;
      z-index: 400;
      box-shadow: 0 -4px 24px rgba(16, 32, 51, .12);
    }
    header { padding: 9px 10px 7px; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 6px; font-size: 17px; line-height: 1.2; letter-spacing: 0; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 5px; }
    .summary div { border: 1px solid var(--line); border-radius: 8px; padding: 6px 6px; background: #f8fafc; }
    .summary b { display: block; font-size: 15px; line-height: 1.05; }
    .summary span { display: block; color: var(--muted); font-size: 10px; margin-top: 2px; }
    .selectors { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 7px; }
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      outline: none;
      background: #fff;
      font-size: 13px;
      min-width: 0;
    }
    .route-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
    }
    .route-toggle label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-weight: 800;
    }
    .route-toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
    }
    .note { margin-top: 6px; color: var(--muted); font-size: 11px; line-height: 1.3; }
    .content { min-height: 0; overflow: auto; padding: 4px 10px calc(18px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling: touch; }
    .directory-title { padding: 8px 4px; color: var(--muted); font-size: 13px; }
    .district-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .district-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 10px;
      background: #fff;
    }
    .district-card b { display: block; font-size: 15px; line-height: 1.35; }
    .district-card span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }
    .district-card button {
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      background: var(--blue);
      color: #fff;
      font-weight: 800;
    }
    .stop { display: grid; grid-template-columns: 30px minmax(0, 1fr); gap: 8px; padding: 8px 4px; border-bottom: 1px solid #edf1f6; }
    .stop.is-hidden { display: none; }
    .badge {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }
    .stop:first-child .badge { background: var(--green); }
    .stop:last-child .badge { background: var(--red); }
    .name { margin-top: 0; font-weight: 800; font-size: 14px; line-height: 1.3; }
    .addr, .meta { margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 6px; }
    .actions a, .actions button {
      display: flex;
      min-height: 34px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--blue);
      font-weight: 800;
      font-size: 12px;
    }
    .actions a.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .number-marker {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      background: var(--blue);
      border: 2px solid #fff;
      box-shadow: 0 3px 9px rgba(16, 32, 51, .30);
    }
    .number-marker.start { background: var(--green); }
    .number-marker.end { background: var(--red); }
    .leaflet-popup-content-wrapper { border-radius: 8px; }
    .popup-title { font-weight: 800; margin-bottom: 4px; }
    .popup-text { color: #344054; line-height: 1.45; }
    .gate {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: linear-gradient(160deg, #0f3d5e 0%, #1b6f6a 100%);
    }
    .gate-card {
      width: min(430px, 100%);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(0,0,0,.28);
      padding: 22px;
    }
    .gate-card h2 { margin: 0 0 8px; font-size: 22px; letter-spacing: 0; }
    .gate-card p { margin: 0 0 15px; color: var(--muted); line-height: 1.55; font-size: 14px; }
    .gate-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-size: 18px;
      outline: none;
    }
    .gate-card button {
      width: 100%;
      margin-top: 10px;
      border: 0;
      border-radius: 8px;
      padding: 12px;
      background: #0f3d5e;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
    }
    .error { min-height: 20px; margin-top: 8px; color: #be123c; font-size: 13px; }
    @media (min-width: 900px) {
      body { overflow: hidden; }
      .app { grid-template-columns: 430px minmax(0, 1fr); grid-template-rows: 100vh; }
      .map-wrap { grid-column: 2; grid-row: 1; height: 100vh; min-height: 100vh; }
      #map { height: 100vh; min-height: 100vh; }
      .sheet { grid-column: 1; grid-row: 1; border-top: 0; border-right: 1px solid var(--line); border-radius: 0; margin-top: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div id="gate" class="gate">
    <section class="gate-card" aria-label="访问口令">
      <h2>VETMAP</h2>
      <p>请输入访问口令。这个口令只是避免链接被随手打开，不是强安全保护。</p>
      <input id="pass" type="password" autocomplete="current-password" inputmode="text" placeholder="访问口令" />
      <button id="unlock">打开地图</button>
      <div id="error" class="error" aria-live="polite"></div>
    </section>
  </div>

  <main id="app" class="app hidden">
    <div class="map-wrap">
      <div id="map"></div>
      <button id="fit" class="map-fit" type="button">全图</button>
    </div>
    <section class="sheet">
      <header>
        <h1 id="title">VETMAP</h1>
        <div class="summary">
          <div><b id="clinicCount">--</b><span>店面</span></div>
          <div><b id="districtCount">--</b><span>区县</span></div>
          <div><b id="distance">--</b><span>路线里程</span></div>
          <div><b>GCJ-02</b><span>高德坐标</span></div>
        </div>
        <div class="selectors">
          <select id="province"></select>
          <select id="city"></select>
          <select id="district"></select>
        </div>
        <div class="route-toggle">
          <label><input id="routeToggle" type="checkbox" checked /> 显示路径</label>
          <span>关闭后只显示点位</span>
        </div>
        <div id="note" class="note">选择省、市、区县后，只加载该区县数据；每个区县都有独立分享地址。</div>
      </header>
      <div id="content" class="content"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const password = String.fromCharCode(118,101,116,50,48,50,54);
    const state = {
      catalog: null,
      selectedProvince: null,
      selectedCity: null,
      selectedDistrict: null,
      districtPayload: null,
      map: null,
      markerLayer: null,
      routeLayer: null,
      bounds: null,
      markers: [],
    };
    window.vetmapState = state;

    const el = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[ch]));
    const qs = new URLSearchParams(location.search);

    el("unlock").addEventListener("click", unlockPage);
    el("pass").addEventListener("keydown", event => {
      if (event.key === "Enter") unlockPage();
    });

    async function unlockPage() {
      if (el("pass").value !== password) {
        el("error").textContent = "口令不对";
        el("pass").select();
        return;
      }
      localStorage.setItem("vetmap_access", "ok");
      el("gate").classList.add("hidden");
      el("app").classList.remove("hidden");
      await boot();
    }

    async function boot() {
      if (state.catalog) return;
      state.catalog = await fetchJson("data/catalog.json");
      initMap();
      buildSelectors();
      hydrateFromUrl();
      bindControls();
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-cache" });
      if (!res.ok) throw new Error(`加载失败：${url}`);
      return res.json();
    }

    function initMap() {
      state.map = L.map("map", { zoomControl: true, preferCanvas: true });
      L.tileLayer("https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}", {
        subdomains: ["1", "2", "3", "4"],
        maxZoom: 19,
        attribution: "高德地图"
      }).addTo(state.map);
      state.markerLayer = L.layerGroup().addTo(state.map);
      state.routeLayer = L.layerGroup().addTo(state.map);
      state.map.setView([32.5, 113.5], 4);
    }

    function buildSelectors() {
      const provinces = state.catalog.provinces;
      fillSelect(el("province"), provinces, "选择省份");
      el("province").addEventListener("change", () => {
        state.selectedProvince = findById(provinces, el("province").value);
        state.selectedCity = null;
        state.selectedDistrict = null;
        fillCitySelect();
        renderDirectory();
      });
      el("city").addEventListener("change", () => {
        state.selectedCity = findById(state.selectedProvince?.cities ?? [], el("city").value);
        state.selectedDistrict = null;
        fillDistrictSelect();
        renderDirectory();
      });
      el("district").addEventListener("change", () => {
        state.selectedDistrict = findById(state.selectedCity?.districts ?? [], el("district").value);
        if (state.selectedDistrict) loadDistrict(state.selectedDistrict.id);
      });
    }

    function fillSelect(select, items, placeholder) {
      select.innerHTML = `<option value="">${placeholder}</option>` + items.map(item =>
        `<option value="${item.id}">${escapeHtml(item.name)}（${item.count}）</option>`
      ).join("");
    }

    function fillCitySelect() {
      fillSelect(el("city"), state.selectedProvince?.cities ?? [], "选择城市");
      fillDistrictSelect();
    }

    function fillDistrictSelect() {
      fillSelect(el("district"), state.selectedCity?.districts ?? [], "选择区县");
    }

    function findById(items, id) {
      return items.find(item => item.id === id) ?? null;
    }

    function findDistrict(id) {
      for (const province of state.catalog.provinces) {
        for (const city of province.cities) {
          const district = city.districts.find(item => item.id === id);
          if (district) return { province, city, district };
        }
      }
      return null;
    }

    function hydrateFromUrl() {
      const id = qs.get("id");
      if (!id) {
        renderEmpty();
        return;
      }
      const hit = findDistrict(id);
      if (hit) {
        state.selectedProvince = hit.province;
        state.selectedCity = hit.city;
        state.selectedDistrict = hit.district;
        el("province").value = hit.province.id;
        fillCitySelect();
        el("city").value = hit.city.id;
        fillDistrictSelect();
        el("district").value = hit.district.id;
        loadDistrict(hit.district.id, false);
      } else {
        renderDirectory();
      }
    }

    function bindControls() {
      el("fit").addEventListener("click", () => {
        if (state.bounds) {
          state.map.fitBounds(state.bounds, { padding: [26, 26] });
        } else {
          state.map.setView([32.5, 113.5], 4);
        }
      });
      el("routeToggle").addEventListener("change", () => {
        const show = el("routeToggle").checked;
        if (show) {
          state.routeLayer.addTo(state.map);
        } else {
          state.map.removeLayer(state.routeLayer);
        }
      });
    }

    function clearMap() {
      state.markerLayer.clearLayers();
      state.routeLayer.clearLayers();
      if (state.map.hasLayer(state.routeLayer)) state.map.removeLayer(state.routeLayer);
      state.markers = [];
      state.bounds = null;
    }

    function renderEmpty() {
      state.selectedProvince = null;
      state.selectedCity = null;
      state.selectedDistrict = null;
      state.districtPayload = null;
      clearMap();
      el("province").value = "";
      fillCitySelect();
      el("city").value = "";
      fillDistrictSelect();
      el("district").value = "";
      el("title").textContent = "VETMAP";
      el("clinicCount").textContent = "--";
      el("districtCount").textContent = "--";
      el("distance").textContent = "--";
      el("note").textContent = "";
      el("content").innerHTML = "";
      state.map.setView([32.5, 113.5], 4);
      history.replaceState(null, "", location.pathname);
    }

    function renderDirectory() {
      state.districtPayload = null;
      clearMap();
      const province = state.selectedProvince;
      const city = state.selectedCity;
      el("title").textContent = city ? `${province.name} · ${city.name}` : province ? province.name : "VETMAP";
      el("clinicCount").textContent = city?.count ?? province?.count ?? state.catalog.counts.clinics;
      el("districtCount").textContent = city?.district_count ?? province?.district_count ?? state.catalog.counts.districts;
      el("distance").textContent = "--";
      el("note").textContent = "选择省、市、区县后，只加载该区县数据；每个区县都有独立分享地址。";

      const districts = city ? city.districts : province ? province.cities.flatMap(c => c.districts.map(d => ({ ...d, city_name: c.name }))) : state.catalog.provinces.flatMap(p => p.cities.flatMap(c => c.districts.map(d => ({ ...d, province_name: p.name, city_name: c.name }))));
      el("content").innerHTML = `
        <div class="directory-title">共 ${districts.length} 个区县，点击进入独立路线页。</div>
        <div class="district-grid">
          ${districts.map(d => `
            <article class="district-card">
              <div>
                <b>${escapeHtml(d.name)}</b>
                <span>${escapeHtml([d.province_name, d.city_name].filter(Boolean).join(" · "))} · ${d.count} 家</span>
              </div>
              <button type="button" data-district="${d.id}">进入</button>
            </article>
          `).join("")}
        </div>
      `;
      el("content").querySelectorAll("[data-district]").forEach(button => {
        button.addEventListener("click", () => loadDistrict(button.dataset.district));
      });
      history.replaceState(null, "", location.pathname);
    }

    async function loadDistrict(id, updateUrl = true) {
      const hit = findDistrict(id);
      if (!hit) return;
      state.selectedProvince = hit.province;
      state.selectedCity = hit.city;
      state.selectedDistrict = hit.district;
      el("province").value = hit.province.id;
      fillCitySelect();
      el("city").value = hit.city.id;
      fillDistrictSelect();
      el("district").value = hit.district.id;

      const payload = await fetchJson(hit.district.file);
      state.districtPayload = payload;
      if (updateUrl) history.replaceState(null, "", `?id=${encodeURIComponent(id)}`);
      renderDistrict(payload);
    }

    function renderDistrict(payload) {
      clearMap();
      if (el("routeToggle").checked && !state.map.hasLayer(state.routeLayer)) {
        state.routeLayer.addTo(state.map);
      }
      const rows = payload.rows;
      const summary = payload.summary;
      el("title").textContent = `${summary.province} · ${summary.city} · ${summary.district}`;
      el("clinicCount").textContent = summary.count;
      el("districtCount").textContent = "1";
      el("distance").textContent = Number(summary.total_distance_km).toFixed(1) + " km";
      el("note").textContent = "按编号逐站前往；点“高德定位”会打开高德地图。实际驾车/步行以高德实时导航为准。";

      const latlngs = rows.map(p => [p.lat, p.lng]);
      if (latlngs.length) {
      L.polyline(latlngs, { color: "#db4c15", weight: 4, opacity: 0.9 }).addTo(state.routeLayer);
        if (!el("routeToggle").checked && state.map.hasLayer(state.routeLayer)) {
          state.map.removeLayer(state.routeLayer);
        }
        state.bounds = L.latLngBounds(latlngs);
        state.map.fitBounds(state.bounds, { padding: [26, 26] });
      }
      rows.forEach((p, index) => {
        const cls = index === 0 ? "number-marker start" : index === rows.length - 1 ? "number-marker end" : "number-marker";
        const icon = L.divIcon({
          className: "",
          html: `<div class="${cls}">${p.order}</div>`,
          iconSize: [27, 27],
          iconAnchor: [13, 13],
          popupAnchor: [0, -14]
        });
        const marker = L.marker([p.lat, p.lng], { icon }).addTo(state.markerLayer);
        marker.bindPopup(`
          <div class="popup-title">${p.order}. ${escapeHtml(p.name)}</div>
          <div class="popup-text">${escapeHtml(p.address || "地址缺失")}</div>
          <div class="popup-text">电话：${escapeHtml(p.phone || "未提供")}</div>
          <div class="popup-text">累计：${Number(p.cumulative_distance_km).toFixed(2)} km</div>
          <div class="popup-text"><a href="${p.amap_marker_url}" target="_blank" rel="noreferrer">高德定位</a></div>
        `);
        marker.on("click", () => highlight(index));
        state.markers.push(marker);
      });
      renderStops(rows);
    }

    function renderStops(rows) {
      el("content").innerHTML = rows.map((p, index) => `
        <article class="stop" data-index="${index}" data-search="${escapeHtml(`${p.order} ${p.name} ${p.address} ${p.phone} ${p.area}`.toLowerCase())}">
          <div><span class="badge">${p.order}</span></div>
          <div>
            <div class="name">${escapeHtml(p.name)}</div>
            <div class="addr">${escapeHtml(p.address || "地址缺失")}</div>
            <div class="meta">上一站 ${Number(p.prev_distance_km).toFixed(2)} km · 累计 ${Number(p.cumulative_distance_km).toFixed(2)} km · 电话：${escapeHtml(p.phone || "未提供")}</div>
            <div class="actions">
              <a class="primary" href="${p.amap_marker_url}" target="_blank" rel="noreferrer">高德定位</a>
              <button type="button" data-focus="${index}">地图定位</button>
            </div>
          </div>
        </article>
      `).join("");
      el("content").querySelectorAll("[data-focus]").forEach(button => {
        button.addEventListener("click", () => highlight(Number(button.dataset.focus)));
      });
    }

    function highlight(index) {
      const p = state.districtPayload.rows[index];
      state.map.setView([p.lat, p.lng], Math.max(state.map.getZoom(), 15), { animate: true });
      state.markers[index].openPopup();
      document.querySelector(`[data-index="${index}"]`)?.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }

    if (localStorage.getItem("vetmap_access") === "ok") {
      el("gate").classList.add("hidden");
      el("app").classList.remove("hidden");
      boot();
    } else {
      el("pass").focus();
    }
  </script>
</body>
</html>
